            <div class="conv-field"><label>ftH2O</label><input type="number" id="p-fth2o" placeholder="0"></div>
            <div class="conv-field"><label>inHg</label><input type="number" id="p-inhg" placeholder="0"></div>
            <div class="conv-field"><label>mmHg</label><input type="number" id="p-mmhg" placeholder="0"></div>

<script>
    // --- PRESSURE LOGIC ---
    const pFactors = {
        psig: 1, bar: 0.0689476, kpa: 6.89476, atms: 0.068046, inh2o: 27.7076,
        fth2o: 2.30896, inhg: 2.03602, mmhg: 51.7149, kgcm2: 0.070307
    };

    function convertPressure(unit, value) {
        if (value === "") return;
        const base = parseFloat(value) / pFactors[unit];
        Object.keys(pFactors).forEach(key => {
            if (key !== unit) {
                const res = base * pFactors[key];
                document.getElementById(`p-${key}`).value = res.toFixed(4);
            }
        });
    }

    // --- VOLUME LOGIC (Oilfield Standard Units) ---
    const vFactors = {
        litres: 1,
        gallons: 0.264172,     // 1 Litre to US Gallons
        barrels: 0.00628981,   // 1 Litre to Oil Barrels
        in3: 61.0237,          // 1 Litre to Cubic Inches
        ft3: 0.0353147,        // 1 Litre to Cubic Feet
        cm3: 1000,             // 1 Litre to Cubic CM
        m3: 0.001              // 1 Litre to Cubic Meters
    };

    function convertVolume(unit, value) {
        if (value === "") return;
        const base = parseFloat(value) / vFactors[unit];
        Object.keys(vFactors).forEach(key => {
            if (key !== unit) {
                const res = base * vFactors[key];
                // Display logic for large/small numbers
                document.getElementById(`v-${key}`).value = (res > 100000 || res < 0.001) ? res.toPrecision(6) : res.toFixed(4);
            }
        });
    }

    // --- EVENT LISTENERS ---
    document.addEventListener('DOMContentLoaded', () => {
        // Pressure Inputs
        Object.keys(pFactors).forEach(key => {
            document.getElementById(`p-${key}`).addEventListener('input', (e) => convertPressure(key, e.target.value));
        });

        // Volume Inputs
        Object.keys(vFactors).forEach(key => {
            document.getElementById(`v-${key}`).addEventListener('input', (e) => convertVolume(key, e.target.value));
        });
    });
</script>

    <script>
      const unitMap = {
        pressure: {
          units: { psi: 1, kPa: 6.89476, bar: 0.0689476, MPa: 0.00689476 },
        },
        permeability: {
          units: { md: 1, "m²": 9.869233e-16, "μm²": 0.0009869233 },
        },
        viscosity: {
          units: { cp: 1, "Pa·s": 0.001, "mPa·s": 1 },
        },
        length: {
          units: { ft: 1, m: 0.3048, in: 12 },
        },
        volume: {
          units: { bbl: 1, "m³": 0.158987, L: 158.987 },
        },
      };

      const convTabs = document.querySelectorAll("#converter-tabs .pill");
      const convValue = document.getElementById("conv-value");
      const convFrom = document.getElementById("conv-from");
      const convTo = document.getElementById("conv-to");
      const convResult = document.getElementById("conv-result");
      const convUnit = document.getElementById("conv-unit");

      let currentType = "pressure";

      function populateUnits(type) {
        const units = Object.keys(unitMap[type].units);
        convFrom.innerHTML = units.map((u) => `<option>${u}</option>`).join("");
        convTo.innerHTML = units.map((u) => `<option>${u}</option>`).join("");
        convFrom.value = units[0];
        convTo.value = units[1] || units[0];
        updateConversion();
      }

      function updateConversion() {
        const value = parseFloat(convValue.value) || 0;
        const from = convFrom.value;
        const to = convTo.value;
        const factorFrom = unitMap[currentType].units[from];
        const factorTo = unitMap[currentType].units[to];
        const base = value * factorFrom;
        const result = base / factorTo;
        convResult.textContent = result.toFixed(4);
        convUnit.textContent = to;
      }

      convTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          convTabs.forEach((btn) => btn.classList.remove("active"));
          tab.classList.add("active");
          currentType = tab.dataset.type;
          populateUnits(currentType);
        });
      });

      [convValue, convFrom, convTo].forEach((el) => el.addEventListener("input", updateConversion));
      populateUnits(currentType);

      const p1hr = document.getElementById("p1hr");
      const pwf = document.getElementById("pwf");
      const slope = document.getElementById("slope");
      const kterm = document.getElementById("kterm");
      const skinResult = document.getElementById("skin-result");
      const skinLabel = document.getElementById("skin-label");

      function updateSkin() {
        const s = (parseFloat(p1hr.value) - parseFloat(pwf.value)) / (parseFloat(slope.value) || 1) - Math.log10(parseFloat(kterm.value) || 1);
        const sVal = isFinite(s) ? s : 0;
        skinResult.textContent = sVal.toFixed(2);
        if (sVal < 0) skinLabel.textContent = "Stimulated";
        else if (sVal < 5) skinLabel.textContent = "Slight damage";
        else skinLabel.textContent = "Severe damage";
      }

      [p1hr, pwf, slope, kterm].forEach((el) => el.addEventListener("input", updateSkin));
      updateSkin();

      const tp = document.getElementById("tp");
      const dt = document.getElementById("dt");
      const hornerResult = document.getElementById("horner-result");
      const hornerLog = document.getElementById("horner-log");

      function updateHorner() {
        const tpVal = parseFloat(tp.value) || 0;
        const dtVal = parseFloat(dt.value) || 1;
        const ratio = (tpVal + dtVal) / dtVal;
        hornerResult.textContent = ratio.toFixed(3);
        hornerLog.textContent = `log10 = ${Math.log10(ratio).toFixed(4)}`;
      }

      [tp, dt].forEach((el) => el.addEventListener("input", updateHorner));
      updateHorner();

      const eqInputs = document.querySelectorAll(".eq-input");
      function updateEquations() {
        const radial = {
          q: parseFloat(document.querySelector('[data-eq="radial"][data-key="q"]').value) || 0,
          mu: parseFloat(document.querySelector('[data-eq="radial"][data-key="mu"]').value) || 0,
          k: parseFloat(document.querySelector('[data-eq="radial"][data-key="k"]').value) || 0,
          h: parseFloat(document.querySelector('[data-eq="radial"][data-key="h"]').value) || 1,
        };
        const radialResult = ((162.6 * radial.q * radial.mu) / (radial.k * radial.h || 1)).toFixed(2);
        document.getElementById("radial-result").textContent = isFinite(radialResult) ? radialResult : "0.00";

        const hornerEq = {
          tp: parseFloat(document.querySelector('[data-eq="horner"][data-key="tp"]').value) || 0,
          dt: parseFloat(document.querySelector('[data-eq="horner"][data-key="dt"]').value) || 1,
        };
        document.getElementById("horner-eq-result").textContent = ((hornerEq.tp + hornerEq.dt) / hornerEq.dt).toFixed(2);

        const perm = {
          q: parseFloat(document.querySelector('[data-eq="perm"][data-key="q"]').value) || 0,
          mu: parseFloat(document.querySelector('[data-eq="perm"][data-key="mu"]').value) || 0,
          m: parseFloat(document.querySelector('[data-eq="perm"][data-key="m"]').value) || 1,
          h: parseFloat(document.querySelector('[data-eq="perm"][data-key="h"]').value) || 1,
        };
        const permResult = (162.6 * perm.q * perm.mu) / (perm.m * perm.h || 1);
        document.getElementById("perm-result").textContent = permResult.toFixed(2);
      }

      eqInputs.forEach((input) => input.addEventListener("input", updateEquations));
      updateEquations();

      document.querySelectorAll(".accordion-header").forEach((header) => {
        header.addEventListener("click", () => {
          const acc = header.closest(".accordion");
          acc.classList.toggle("open");
        });
      });

      const librarySearch = document.getElementById("library-search");
      const libraryFilters = document.querySelectorAll("#library-filters .pill");
      const libraryCards = document.querySelectorAll(".library-card");
      let currentFilter = "all";

      function filterLibrary() {
        const query = librarySearch.value.toLowerCase();
        libraryCards.forEach((card) => {
          const matchesFilter = currentFilter === "all" || card.dataset.type === currentFilter;
          const text = `${card.dataset.title} ${card.dataset.author}`.toLowerCase();
          const matchesSearch = text.includes(query);
          card.style.display = matchesFilter && matchesSearch ? "grid" : "none";
        });
      }

      libraryFilters.forEach((pill) => {
        pill.addEventListener("click", () => {
          libraryFilters.forEach((btn) => btn.classList.remove("active"));
          pill.classList.add("active");
          currentFilter = pill.dataset.filter;
          filterLibrary();
        });
      });

      librarySearch.addEventListener("input", filterLibrary);
      filterLibrary();
    </script>
