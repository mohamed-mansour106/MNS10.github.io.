<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Well Testing Simulator - Universal Edition</title>
    <style>
        :root { --accent: #00ffcc; --bg: rgba(20, 20, 20, 0.9); }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; touch-action: none; }
        
        /* واجهة المستخدم متجاوبة */
        #ui { 
            position: absolute; top: 10px; right: 10px; left: 10px; 
            display: flex; flex-direction: column; align-items: flex-end;
            pointer-events: none; z-index: 100; 
        }
        
        .panel { 
            background: var(--bg); color: var(--accent); padding: 12px; 
            border: 1px solid #333; border-radius: 12px; pointer-events: auto; 
            margin-bottom: 8px; width: 100%; max-width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* تحسين أزرار التحكم للموبايل */
        .move-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .btn-ctrl { 
            background: #222; color: #fff; border: 1px solid #444; 
            height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; user-select: none; font-size: 20px;
            touch-action: none; 
        }
        .btn-ctrl:active { background: var(--accent); color: #000; }

        .gauge-circle { width: 50px; height: 50px; border: 2px solid #444; border-radius: 50%; position: relative; margin: 0 auto 5px; background: #050505; }
        .gauge-needle { width: 2px; height: 25px; background: #ff3300; position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; transition: transform 0.4s; }
        
        button { width: 100%; padding: 10px; cursor: pointer; background: #c00; color: white; border: none; border-radius: 6px; font-weight: bold; }
        .cam-btn { background: #007bff; margin-bottom: 5px; }

        h4 { margin: 0 0 8px 0; color: #fff; border-bottom: 2px solid var(--accent); padding-bottom: 4px; text-align: center; font-size: 14px; }
        #hint { position: absolute; bottom: 10px; left: 10px; color: #aaa; font-size: 11px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 15px; pointer-events: none; }

        /* تعديلات للشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            .panel { max-width: 180px; padding: 8px; }
            .btn-ctrl { height: 40px; font-size: 18px; }
            .gauge-circle { width: 40px; height: 40px; }
            .gauge-needle { height: 20px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h4>الكاميرا</h4>
            <button class="cam-btn" onclick="toggleCamera()">تبديل المنظور (C)</button>
        </div>

        <div class="panel">
            <h4>التحكم</h4>
            <div class="move-controls">
                <div></div>
                <div class="btn-ctrl" id="btn-f">↑</div>
                <div></div>
                <div class="btn-ctrl" id="btn-l">←</div>
                <div class="btn-ctrl" id="btn-b">↓</div>
                <div class="btn-ctrl" id="btn-r">→</div>
            </div>
        </div>

        <div class="panel">
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div class="gauge-circle"><div id="n-oil" class="gauge-needle"></div></div>
                    <div id="v-oil" style="font-size:12px;">0</div><small style="font-size:9px;">BPD</small>
                </div>
                <div>
                    <div class="gauge-circle"><div id="n-press" class="gauge-needle"></div></div>
                    <div id="v-press" style="font-size:12px;">120</div><small style="font-size:9px;">PSI</small>
                </div>
            </div>
        </div>

        <div class="panel" id="controls-ui">
            <p style="text-align:center; color:#888; font-size: 11px;">المس المعدة للتشغيل</p>
        </div>
    </div>

    <div id="hint">لمس: كاميرا | أزرار: حركة | نقر: معدات</div>

    <script src="three.min.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, loader, worker;
        let isWorkerView = false;
        const sim = { choke: 0, press: 120, isOpen: false };
        let tankLevel = 0;
        const moveState = { f: false, b: false, l: false, r: false };
        let fireParticles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 3000);
            camera.position.set(60, 40, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(window.devicePixelRatio); // دعم شاشات الريتنا والموبايل العالي
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // إضاءة
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            scene.add(new THREE.GridHelper(200, 40, 0x222222, 0x111111));

            loader = new THREE.GLTFLoader();
            
            // تحميل العامل
            loader.load('worker.glb', (gltf) => {
                worker = gltf.scene;
                worker.scale.set(3, 3, 3);
                scene.add(worker);
            });

            // تحميل المعدات (نفس الوظيفة السابقة)
            function loadModel(path, pos, scale, name, rot=0) {
                loader.load(path, (gltf) => {
                    const m = gltf.scene;
                    m.position.set(pos.x, pos.y, pos.z);
                    m.scale.set(scale, scale, scale);
                    m.name = name;
                    m.rotation.y = rot * (Math.PI / 180);
                    m.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                    scene.add(m);
                });
            }

            loadModel('wellhead.glb', {x: -25, y: 6.5, z: 0.5}, 7, "Wellhead");
            loadModel('chokemanifold.glb', {x: -10, y: 2, z: 0}, 5, "ChokeManifold", 45);
            loadModel('separator.glb', {x: 10, y: 4, z: -5}, 8, "Separator", 270);
            loadModel('surgetank.glb', {x: 12, y: 8, z: 18}, 8, "SurgeTank");
            loadModel('burnerboom.glb', {x: 35, y: 5, z: 0}, 10, "BurnerBoom", 270);

            // الأنابيب
            placePipe({x: -20, y: 1.5, z: 0}, {r: 0.3, h: 10}, {x: 0, y: 0, z: 90});
            placePipe({x: 0, y: 1.5, z: 0}, {r: 0.3, h: 14}, {x: 0, y: 0, z: 90});
            placePipe({x: 20, y: 1.5, z: 0}, {r: 0.3, h: 15}, {x: 0, y: 0, z: 90});

            setupInputHandlers();
            animate();
        }

        function placePipe(pos, size, rot) {
            const pipe = new THREE.Mesh(new THREE.CylinderGeometry(size.r, size.r, size.h, 16), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            pipe.position.set(pos.x, pos.y, pos.z);
            pipe.rotation.set(rot.x*(Math.PI/180), rot.y*(Math.PI/180), rot.z*(Math.PI/180));
            scene.add(pipe);
        }

        function setupInputHandlers() {
            // نظام اللمس للأزرار
            const bind = (id, key) => {
                const el = document.getElementById(id);
                const start = (e) => { e.preventDefault(); moveState[key] = true; };
                const end = (e) => { e.preventDefault(); moveState[key] = false; };
                el.addEventListener('touchstart', start, {passive: false});
                el.addEventListener('touchend', end);
                el.addEventListener('mousedown', start);
                el.addEventListener('mouseup', end);
                el.addEventListener('mouseleave', end);
            };

            bind('btn-f', 'f'); bind('btn-b', 'b'); bind('btn-l', 'l'); bind('btn-r', 'r');

            // اختيار المعدات (ماوس ولمس)
            const onSelect = (e) => {
                if (e.target.closest('.panel')) return;
                const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                const ray = new THREE.Raycaster();
                const mouse = new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
                ray.setFromCamera(mouse, camera);
                const hits = ray.intersectObjects(scene.children, true);
                if(hits.length > 0) {
                    let obj = hits[0].object;
                    while(obj.parent && !["Wellhead", "Separator", "ChokeManifold", "SurgeTank", "BurnerBoom"].includes(obj.name)) obj = obj.parent;
                    if(obj.name) handleSelection(obj.name);
                }
            };

            window.addEventListener('mousedown', onSelect);
            window.addEventListener('touchstart', onSelect, {passive: true});

            // الكيبورد
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w' || k === 'arrowup') moveState.f = true;
                if (k === 's' || k === 'arrowdown') moveState.b = true;
                if (k === 'a' || k === 'arrowleft') moveState.l = true;
                if (k === 'd' || k === 'arrowright') moveState.r = true;
                if (k === 'c') toggleCamera();
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w' || k === 'arrowup') moveState.f = false;
                if (k === 's' || k === 'arrowdown') moveState.b = false;
                if (k === 'a' || k === 'arrowleft') moveState.l = false;
                if (k === 'd' || k === 'arrowright') moveState.r = false;
            });
        }

        function handleSelection(name) {
            const ui = document.getElementById('controls-ui');
            if (name === "ChokeManifold") {
                ui.innerHTML = `<h4>Choke Manifold</h4><button onclick="toggleWell()">${sim.isOpen ? 'إغلاق البئر' : 'فتح البئر'}</button>
                <input type="range" min="0" max="64" value="${sim.choke}" style="width:100%; margin-top:10px;" oninput="sim.choke=parseInt(this.value)">`;
            } else if (name === "Separator") {
                ui.innerHTML = `<h4>Separator</h4><p>الضغط: ${Math.floor(sim.press)} PSI</p>`;
            } else if (name === "SurgeTank") {
                ui.innerHTML = `<h4>Surge Tank</h4><p>المستوى: ${tankLevel.toFixed(1)}%</p><button onclick="tankLevel=0">تفريغ</button>`;
            } else { ui.innerHTML = `<h4>${name}</h4><p>معدة جاهزة</p>`; }
        }

        function toggleWell() { sim.isOpen = !sim.isOpen; if(!sim.isOpen) sim.choke=0; handleSelection("ChokeManifold"); }

        function toggleCamera() {
            isWorkerView = !isWorkerView;
            controls.enabled = !isWorkerView;
            if (!isWorkerView) camera.position.set(60, 40, 40);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls && !isWorkerView) controls.update();

            if (worker) {
                if (moveState.f) worker.translateZ(0.3);
                if (moveState.b) worker.translateZ(-0.3);
                if (moveState.l) worker.rotation.y += 0.05;
                if (moveState.r) worker.rotation.y -= 0.05;

                if (isWorkerView) {
                    const offset = new THREE.Vector3(0, 7, -14).applyQuaternion(worker.quaternion);
                    camera.position.copy(worker.position).add(offset);
                    camera.lookAt(worker.position.clone().add(new THREE.Vector3(0, 5, 12).applyQuaternion(worker.quaternion)));
                }
            }

            // تحديث المقاييس
            let oil = sim.isOpen ? sim.choke * 18.5 : 0;
            document.getElementById('n-oil').style.transform = `rotate(${(oil/1200)*180-90}deg)`;
            document.getElementById('v-oil').innerText = Math.floor(oil);
            document.getElementById('n-press').style.transform = `rotate(${(sim.press/1000)*180-90}deg)`;
            document.getElementById('v-press').innerText = Math.floor(sim.press);

            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
