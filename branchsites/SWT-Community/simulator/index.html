<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Well Testing Island - Pipelines Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #331800; }
        #ui { position: absolute; top: 10px; right: 10px; pointer-events: none; z-index: 100; }
        .panel { 
            background: rgba(10, 10, 10, 0.9); color: #ff9500; padding: 15px; border: 1px solid #ff9500; 
            border-radius: 12px; pointer-events: auto; margin-bottom: 10px; min-width: 260px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .gauge-circle { width: 65px; height: 65px; border: 3px solid #444; border-radius: 50%; position: relative; margin: 5px auto; background: #050505; }
        .gauge-needle { width: 2px; height: 32px; background: #ff3300; position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; transition: transform 0.4s; }
        button { width: 100%; padding: 8px; cursor: pointer; background: #ff9500; color: #000; border: none; border-radius: 6px; font-weight: bold; margin-top: 5px; }
        button.cam-btn { background: #007bff; color: white; }
        .control-group { display: flex; gap: 5px; margin-top: 5px; }
        .control-group button { flex: 1; font-size: 11px; }
        h4 { margin: 0 0 10px 0; color: #fff; border-bottom: 2px solid #ff9500; padding-bottom: 5px; text-align: center; }
        .stat-line { display: flex; justify-content: space-between; font-size: 13px; margin: 4px 0; color: #ccc; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h4>الكاميرا</h4>
            <button class="cam-btn" onclick="toggleCamera()">تبديل المنظور (C)</button>
        </div>

        <div class="panel">
            <h4>بيانات الموقع</h4>
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div class="gauge-circle"><div id="n-oil" class="gauge-needle"></div></div>
                    <div id="v-oil">0</div><small>BPD</small>
                </div>
                <div>
                    <div class="gauge-circle"><div id="n-press" class="gauge-needle"></div></div>
                    <div id="v-press">0</div><small>PSI</small>
                </div>
            </div>
            <div class="stat-line"><span>مستوى الـ Surge Tank:</span> <span id="v-tank">0</span>%</div>
        </div>

        <div id="controls-ui" class="panel">
            <p style="text-align:center; color:#888888; font-size: 12px;">اختر معدة للتحكم اليدوي</p>
        </div>
    </div>

    <script src="three.min.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, loader, worker, water;
        let isWorkerView = false;
        const sim = { choke: 0, isOpen: false, sepPressure: 0, sepLevel: 0, tankLevel: 0 };
        const moveState = { f: false, b: false, l: false, r: false };
        let fireParticles = [];

        function toggleCamera() {
            isWorkerView = !isWorkerView;
            controls.enabled = !isWorkerView;
            if (!isWorkerView) { camera.position.set(100, 60, 100); controls.target.set(0, 0, 0); }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
            camera.position.set(100, 60, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            
            // البيئة
            water = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x0044ff, transparent: true, opacity: 0.6 }));
            water.rotation.x = -Math.PI / 2; water.position.y = -0.5;
            scene.add(water);

            const island = new THREE.Mesh(new THREE.CylinderGeometry(65, 70, 3, 64), new THREE.MeshStandardMaterial({ color: 0xedc9af }));
            island.position.y = -1.5;
            scene.add(island);

            // الخامات (Materials)
            const orangePipeMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.2 });
            const lightOrangeEquipMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.3 });

            loader = new THREE.GLTFLoader();
            loader.load('worker.glb', (gltf) => { worker = gltf.scene; worker.scale.set(5,5,5); worker.position.y = 4.7; scene.add(worker); });

            // دالة تحميل النماذج وتغيير ألوانها
            function loadModel(path, pos, scale, name, rot=0, isEquip=true) {
                loader.load(path, (gltf) => {
                    const m = gltf.scene;
                    m.position.set(pos.x, pos.y, pos.z);
                    m.scale.set(scale, scale, scale);
                    m.name = name;
                    m.rotation.y = rot * (Math.PI / 180);
                    
                    m.traverse(n => {
                        if(n.isMesh) {
                            n.material = isEquip ? lightOrangeEquipMat : orangePipeMat;
                        }
                    });
                    scene.add(m);
                });
            }

            // توزيع المعدات (برتقالي فاتح)
            loadModel('wellhead.glb', {x: -30, y: 10.5, z: 0}, 12, "Wellhead", 0, true);
            loadModel('chokemanifold.glb', {x: -10, y: 3, z: 0}, 7, "ChokeManifold", 45, true);
            loadModel('separator.glb', {x: 10, y: 4, z: -8}, 14, "Separator", 270, true);
            loadModel('surgetank.glb', {x: 15, y: 15, z: 18}, 15, "SurgeTank", 0, true);
            loadModel('burnerboom.glb', {x: 55, y: 10, z: 0}, 20, "BurnerBoom", 270, true);

            // --- بناء خطوط الأنابيب (برتقالي عادي) ---
            // --- بناء خطوط الأنابيب بالنظام المحدث ---
            function placePipe(pos, dim, rot) {
                const geometry = new THREE.CylinderGeometry(dim.r, dim.r, dim.h, 16);
                const material = orangePipeMat; // استخدام الخامة المعرفة مسبقاً في كودك
                const cylinder = new THREE.Mesh(geometry, material);
                
                cylinder.position.set(pos.x, pos.y, pos.z);
                cylinder.rotation.set(
                    rot.x * (Math.PI / 180),
                    rot.y * (Math.PI / 180),
                    rot.z * (Math.PI / 180)
                );
                
                scene.add(cylinder);
            }

            // إضافة الأنابيب يدوياً (Manual Pipelines)
            // التنسيق: الموقع {x,y,z} ، الأبعاد {r:نصف القطر, h:الطول} ، الدوران {x,y,z}
            placePipe({x: -24, y: 1.5, z: 0}, {r: 0.4, h: 13}, {x: 0, y: 0, z: 90});  // Well -> Choke
            placePipe({x: 1, y: 1.5, z: 0}, {r: 0.4, h: 15}, {x: 0, y: 0, z: 90}); // Choke -> Sep
            placePipe({x: 11, y: 1.5, z: 6}, {r: 0.4, h: 23}, {x: 90, y: 0, z: 10});   // Sep -> Tank
            placePipe({x: 27, y: 1.5, z: 0}, {r: 0.4, h: 25}, {x: 0, y: 0, z: 90}); // Sep -> Burner


            

            // الشعلة
            for(let i=0; i<30; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff4400, transparent: true}));
                p.visible = false; scene.add(p); fireParticles.push(p);
            }

            // الأحداث (Events)
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k==='w') moveState.f=true; if(k==='s') moveState.b=true;
                if(k==='a') moveState.l=true; if(k==='d') moveState.r=true;
                if(k==='c') toggleCamera();
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k==='w') moveState.f=false; if(k==='s') moveState.b=false;
                if(k==='a') moveState.l=false; if(k==='d') moveState.r=false;
            });

            animate();
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.panel')) return;
            const ray = new THREE.Raycaster();
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(scene.children, true);
            if(hits.length > 0) {
                let obj = hits[0].object;
                while(obj.parent && !["Wellhead", "Separator", "ChokeManifold", "SurgeTank", "BurnerBoom"].includes(obj.name)) obj = obj.parent;
                if(obj.name) handleSelection(obj.name);
            }
        });

        function handleSelection(name) {
            const ui = document.getElementById('controls-ui');
            if (name === "ChokeManifold") {
                ui.innerHTML = `<h4>Choke Manifold</h4>
                <button onclick="sim.isOpen=!sim.isOpen; handleSelection('ChokeManifold')">${sim.isOpen ? 'إغلاق البئر' : 'فتح البئر'}</button>
                <div class="stat-line"><span>الفتحة:</span> <span>${sim.choke}/64"</span></div>
                <input type="range" min="0" max="64" value="${sim.choke}" style="width:100%" oninput="sim.choke=parseInt(this.value); handleSelection('ChokeManifold')">`;
            } 
            else if (name === "Separator") {
                ui.innerHTML = `<h4>Separator Control</h4>
                <div class="stat-line"><span>الضغط:</span> <span>${Math.floor(sim.sepPressure)} PSI</span></div>
                <div class="control-group">
                    <button onclick="sim.sepPressure+=50; handleSelection('Separator')">+ الضغط</button>
                    <button onclick="sim.sepPressure=Math.max(0, sim.sepPressure-50); handleSelection('Separator')">- الضغط</button>
                </div>
                <div class="stat-line" style="margin-top:10px"><span>المستوى:</span> <span>${Math.floor(sim.sepLevel)}%</span></div>
                <div class="control-group">
                    <button onclick="sim.sepLevel=Math.min(100, sim.sepLevel+10); handleSelection('Separator')">+ المستوى</button>
                    <button onclick="sim.sepLevel=Math.max(0, sim.sepLevel-10); handleSelection('Separator')">- المستوى</button>
                </div>`;
            }
            else if (name === "SurgeTank") {
                ui.innerHTML = `<h4>Surge Tank</h4>
                <div class="stat-line"><span>المستوى الحالي:</span> <span>${Math.floor(sim.tankLevel)}%</span></div>
                <button onclick="sim.tankLevel=0; handleSelection('SurgeTank')" style="background:#c00; color:#fff;">Draining Tank (تفريغ)</button>`;
            }
            else { ui.innerHTML = `<h4>${name}</h4><p>معدة جاهزة للتشغيل</p>`; }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls && !isWorkerView) controls.update();

            if (worker) {
                if (moveState.f) worker.translateZ(0.3); if (moveState.b) worker.translateZ(-0.3);
                if (moveState.l) worker.rotation.y += 0.05; if (moveState.r) worker.rotation.y -= 0.05;
                if (isWorkerView) {
                    const offset = new THREE.Vector3(0, 7, -15).applyQuaternion(worker.quaternion);
                    camera.position.copy(worker.position).add(offset);
                    camera.lookAt(worker.position.clone().add(new THREE.Vector3(0, 5, 10).applyQuaternion(worker.quaternion)));
                }
            }

            if(water) water.position.y = -0.5 + Math.sin(Date.now() * 0.001) * 0.05;

            let flow = sim.isOpen ? (sim.choke / 64) * 2000 : 0;
            if(sim.isOpen && sim.choke > 0) {
                sim.tankLevel = Math.min(100, sim.tankLevel + (sim.choke/64)*0.05);
                fireParticles.forEach(p => {
                    p.visible = true;
                    if(p.position.y <= 0) p.position.set(50, 8, 0);
                    p.position.x += 0.15; p.position.y += 0.1; p.material.opacity -= 0.01;
                    if(p.material.opacity <= 0) { p.position.set(50, 8, 0); p.material.opacity = 1; }
                });
            } else { fireParticles.forEach(p => p.visible = false); }

            document.getElementById('n-oil').style.transform = `rotate(${(flow/2500)*180-90}deg)`;
            document.getElementById('v-oil').innerText = Math.floor(flow);
            document.getElementById('n-press').style.transform = `rotate(${(sim.sepPressure/1000)*180-90}deg)`;
            document.getElementById('v-press').innerText = Math.floor(sim.sepPressure);
            document.getElementById('v-tank').innerText = Math.floor(sim.tankLevel);

            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
